<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Calories Calculator">
  <title>Calories Calculator</title>
  <!-- Coral rounded badge -->
  <rect width="512" height="512" rx="112" ry="112" fill="#FF8A7A"/>

  <!-- Avocado skin (pear shape: tapered neck, wide round bulb) -->
  <path d="M 256 80
           C 222 80, 196 116, 184 168
           C 172 220, 110 260, 110 350
           C 110 426, 176 462, 256 462
           C 336 462, 402 426, 402 350
           C 402 260, 340 220, 328 168
           C 316 116, 290 80, 256 80 Z"
        fill="#4F8A3A"/>

  <!-- Flesh (creamy pale green) -->
  <path d="M 256 102
           C 228 102, 208 132, 200 178
           C 192 224, 132 260, 132 348
           C 132 412, 188 442, 256 442
           C 324 442, 380 412, 380 348
           C 380 260, 320 224, 312 178
           C 304 132, 284 102, 256 102 Z"
        fill="#F0EBA5"/>

  <!-- Pit (warm brown — also the face), nudged up into the upper bulb -->
  <circle cx="256" cy="318" r="86" fill="#A06B3A"/>

  <!-- Eyes -->
  <circle cx="228" cy="304" r="12" fill="#2A2730"/>
  <circle cx="284" cy="304" r="12" fill="#2A2730"/>

  <!-- Smile -->
  <path d="M 222 338 Q 256 364 290 338"
        stroke="#2A2730" stroke-width="13" stroke-linecap="round" fill="none"/>
</svg>
